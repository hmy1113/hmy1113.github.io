<style>

* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { margin:0; padding:0; }
body {

}
.app { width:min(100%, 460px); }
.header { text-align:center; margin-bottom:14px; }
h1 { margin:8px 0 6px; font-size:clamp(28px, 6vw, 34px); color:#207b3b; }
.sub { color:var(--muted); font-size:15px; line-height:1.55; font-weight:700; margin:0 auto 8px; }
.topbar { display:flex; justify-content:space-between; align-items:center; gap:10px; margin:10px 0 16px; }
.badge {
  background:rgba(255,255,255,.85); border:1px solid rgba(255,255,255,.9); box-shadow:var(--shadow);
  padding:10px 14px; border-radius:999px; font-weight:800; color:#32506d; font-size:14px;
}
.card-container { width:100%; aspect-ratio: 3 / 4.9; perspective:1200px; margin:0 auto; }
.card {
  width:100%; height:100%; position:relative; transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(.2,.7,.2,1); cursor:pointer;
}
.card-container.flipped .card { transform:rotateY(180deg); }
.face {
  position:absolute; inset:0; backface-visibility:hidden; border-radius:var(--radius); overflow:hidden;
  box-shadow:var(--shadow); background:var(--card);
}
.front {
  border:6px solid #ffb184;
  background:
    radial-gradient(circle at top right, #fff0dd 0%, transparent 28%),
    linear-gradient(180deg, #fffaf5, #ffffff 70%);
  padding:22px 18px 18px;
  display:flex; flex-direction:column;
}
.back {
  border:6px solid #76d0b0;
  background:
    radial-gradient(circle at top left, #dffff2 0%, transparent 30%),
    linear-gradient(180deg, #f7fffb, #ffffff 70%);
  transform:rotateY(180deg);
  padding:18px 16px 16px;
  display:flex; flex-direction:column; align-items:center;
}
.prompt {
  display:inline-flex; align-self:center; background:#fff; border-radius:999px; padding:8px 14px;
  font-size:13px; font-weight:900; color:#ff7a35; border:2px solid #ffd1ba; margin-bottom:12px;
}
.qtitle { font-size:clamp(24px,5.6vw,30px); font-weight:900; line-height:1.25; margin:6px 0 12px; text-align:center; color:#ea6d27; }
.hints { display:grid; gap:10px; margin-top:4px; }
.hint {
  background:#fff; border:2px dashed #ffd2ba; border-radius:18px; padding:12px 14px; text-align:left;
  font-size:18px; line-height:1.5; font-weight:800; color:#334455;
}
.tapbox {
  margin-top:auto; text-align:center; padding:14px 12px; border-radius:18px; background:#fff5ef;
  color:#a05d2d; font-weight:900; font-size:17px;
}
.answer-name { margin:6px 0 4px; font-size:clamp(24px, 5.8vw, 30px); font-weight:900; color:#17825a; text-align:center; }
.meta { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:12px; }
.pill {
  background:#effaf5; color:#2f775d; border:1px solid #d0f1e5; padding:7px 11px; border-radius:999px;
  font-size:13px; font-weight:800;
}
.image-wrap {
  width:100%; flex:1; display:flex; align-items:center; justify-content:center;
  border-radius:22px; overflow:hidden; background:linear-gradient(180deg,#f2fffa,#eefcff); border:2px solid #d9f4eb;
  position:relative; isolation:isolate;
}
.image-bg {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  filter:blur(18px) saturate(1.05) brightness(.96);
  transform:scale(1.1);
  opacity:.42;
}
.image-fade {
  position:absolute; inset:0;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0) 40%, rgba(255,255,255,.48) 100%),
    linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));

}

  position:relative;
  z-index:2;
  width:100%; height:100%;
  object-fit:contain;
  display:block;
  padding:10px;
  background:transparent;
}
.overlay {
  position:absolute; left:12px; right:12px; bottom:12px; background:rgba(255,255,255,.88);
  border-radius:12px; padding:8px 10px; font-size:12px; line-height:1.45; font-weight:800; color:#52677b; text-align:center;

.source-link {

.source-link a {
  color:#2f7f62; text-decoration:none; border-bottom:1px dashed #2f7f62;

.backhint { margin-top:10px; text-align:center; color:#4d6a65; font-weight:800; font-size:14px; line-height:1.5; }
.controls { display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:16px; }
button {

button:active { transform:translateY(1px) scale(.995); }
.prev { background:#ffffff; color:#3b556e; }
.next { background:#35a86b; color:#fff; }
.bottom-controls { display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:12px; }
.secondary { background:#fff; color:#5b6b7a; }
.primary { background:#ffb05e; color:#fff; }
.footer { margin-top:14px; text-align:center; color:#6d7c8d; font-size:13px; font-weight:700; line-height:1.55; }

</style>

function setImageSources(src, altText) {
  dinoImage.src = src;
  dinoImage.alt = altText;
  dinoImageBg.src = src;
}

function preloadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(src);
    img.onerror = () => reject(new Error("load failed"));
    img.src = src;
  });
}

function getLocalImageCandidates(d) {
  const base = d.wikiSearch || '';
  const lower = base.toLowerCase();
  return [
    `images/${base}.jpg`, `images/${base}.jpeg`, `images/${base}.png`, `images/${base}.webp`,
    `images/${lower}.jpg`, `images/${lower}.jpeg`, `images/${lower}.png`, `images/${lower}.webp`
  ];
}

async function tryLoadLocalReconImage(d) {
  const candidates = getLocalImageCandidates(d);
  for (const src of candidates) {
    try {
      await preloadImage(src);
      return src;
    } catch (e) {}
  }
  return null;
}

// ✨ 1. 스미소니언 Open Access API (가장 안전한 CC0 우선)
async function getSmithsonianImage(dinoName) {
  try {
    const response = await fetch(`https://api.si.edu/openaccess/api/v1.0/search?q=${dinoName}&api_key=DEMO_KEY`);
    const data = await response.json();

    if (data.response && data.response.rows && data.response.rows.length > 0) {
      for (const item of data.response.rows) {
        if (item.content && item.content.descriptiveNonRepeating && item.content.descriptiveNonRepeating.online_media) {
          const media = item.content.descriptiveNonRepeating.online_media.media;
          if (media && media.length > 0 && media[0].content) {
            return media[0].content; 
          }
        }
      }
    }
  } catch (e) {
    return null;
  }
  return null;
}

// ✨ 2. 위키미디어 공용 API (Paleoart 우선 검색 및 라이선스 정보 추출)
async function getWikimediaCommonsImage(dinoName) {
  try {
    // 복원도(paleoart) 키워드를 포함해 고퀄리티 이미지를 먼저 찾습니다.
    let res = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${dinoName} paleoart&prop=imageinfo&iiprop=url|extmetadata&format=json&origin=*`);
    let data = await res.json();

    // 복원도가 없으면 해당 공룡 이름으로 일반 검색 (화석/골격 등)
    if (!data.query || !data.query.pages) {
      res = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${dinoName}&prop=imageinfo&iiprop=url|extmetadata&format=json&origin=*`);
      data = await res.json();
    }

    if (data.query && data.query.pages) {
      const pages = Object.values(data.query.pages);
      if (pages.length > 0 && pages[0].imageinfo) {
        const imgInfo = pages[0].imageinfo[0];
        // 라이선스 정보가 있으면 가져오고, 없으면 기본 텍스트 표시
        const license = imgInfo.extmetadata && imgInfo.extmetadata.LicenseShortName ? imgInfo.extmetadata.LicenseShortName.value : '자유 라이선스';
        return { url: imgInfo.url, license: license };
      }
    }
  } catch (e) {
    return null;
  }
  return null;
}

async function updateCard() {
  cardContainer.classList.remove('flipped');

  setTimeout(async () => {
    const d = deck[currentIndex];

    hintList.innerHTML = d.hints.map((h, i) => `<div class="hint">${i + 1}. ${h}</div>`).join('');
    dinoName.textContent = d.name;
    dinoDiet.textContent = d.diet;
    dinoPeriod.textContent = d.period;
    countBadge.textContent = `${currentIndex + 1} / ${deck.length}`;
    overlayText.textContent = "안전한 교육용 이미지를 찾는 중...";

    dinoImage.onerror = () => {
      dinoImage.onerror = null;
      setImageSources(fallbackSvg(d.name), d.name + " 대체 그림");
      overlayText.textContent = "이미지를 불러오지 못해 대체 그림을 표시합니다.";
      sourceLink.innerHTML = "";
    };

    dinoImageBg.onerror = () => {
      dinoImageBg.onerror = null;
      dinoImageBg.src = '';
    };

    // [1순위] 로컬 저장소: 직접 검수한 최상급 이미지가 있다면 무조건 최우선!
    const localRecon = await tryLoadLocalReconImage(d);
    if (localRecon) {
      setImageSources(localRecon, d.name + " 복원 실사 이미지");
      overlayText.textContent = "저장소의 복원 실사 이미지를 표시합니다.";
      sourceLink.innerHTML = `<span style="color:#2f7f62;">로컬 파일: ${localRecon}</span>`;
      return;
    }

    // [2순위] 스미소니언 Open Access (안전하고 교육적인 CC0 박물관 자료)
    const smithsonianImgUrl = await getSmithsonianImage(d.wikiSearch);
    if (smithsonianImgUrl) {
      setImageSources(smithsonianImgUrl, d.name + " 스미소니언 박물관 이미지");
      overlayText.textContent = "스미소니언 박물관의 공식 공개 자료(CC0)입니다.";
      sourceLink.innerHTML = `<a href="https://www.si.edu/openaccess" target="_blank" rel="noopener noreferrer">출처: Smithsonian Open Access</a>`;
      return;
    }

    // [3순위] 위키미디어 공용 (Paleoart 복원도 및 화석 사진)
    const commonsData = await getWikimediaCommonsImage(d.wikiSearch);
    if (commonsData && commonsData.url) {
      setImageSources(commonsData.url, d.name + " 위키미디어 공용 이미지");
      overlayText.textContent = "위키미디어 공용의 과학 기반 복원도/화석입니다.";
      sourceLink.innerHTML = `<a href="https://commons.wikimedia.org/w/index.php?search=${d.wikiSearch}" target="_blank" rel="noopener noreferrer">출처: Wikimedia Commons (${commonsData.license})</a>`;
      return;
    }

    // [4순위] 최후의 보루: 일반 위키백과
    try {
      const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${d.wikiSearch}`);
      const data = await response.json();

      if (data.thumbnail && data.thumbnail.source) {
        const highResUrl = data.thumbnail.source.replace(/\/\d+px-/, '/600px-');
        setImageSources(highResUrl, d.name + " 실제 이미지");
        overlayText.textContent = "위키백과의 공룡 이미지를 표시합니다.";
        sourceLink.innerHTML = `<a href="${d.wikiPageUrl}" target="_blank" rel="noopener noreferrer">위키백과 원문 보기</a>`;
      } else {
        throw new Error("이미지 없음");
      }
    } catch (error) {
      setImageSources(fallbackSvg(d.name), d.name + " 대체 그림");
      overlayText.textContent = "등록된 이미지가 없어 대체 그림을 표시합니다.";
      sourceLink.innerHTML = "";
    }
  }, 180);
}

function flipCard() {
  cardContainer.classList.toggle('flipped');
}

function nextCard(e) {
  if (e) e.stopPropagation();
  currentIndex = (currentIndex + 1) % deck.length;
  updateCard();
}

function prevCard(e) {
  if (e) e.stopPropagation();
  currentIndex = (currentIndex - 1 + deck.length) % deck.length;
  updateCard();
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function shuffleDeck(e) {
  if (e) e.stopPropagation();
  deck = [...dinosaurs];
  shuffleArray(deck);
  currentIndex = 0;
  updateCard();
}

function goFirst(e) {
  if (e) e.stopPropagation();
  deck = [...dinosaurs];
  currentIndex = 0;
  updateCard();
}

window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    flipCard();
  }
});

updateCard();
</script>
